name: "Base Setup"
description: "Base Setup Actions Used Across Workflows"
inputs:
  python_version:
    description: "The python version"
  node_version:
    description: "The node version"
  dependency_type:
    default: "standard"
    description: "The dependency installation type: standard, pre, minimum"
  pnpm_version:
    description: "Optional pnpm version to use. When omitted, pnpm/action-setup reads packageManager from package.json"
  python_package_manager:
    default: "pip"
    description: "The Python package manager to use, either pip or uv pip"
  python_cache_key_suffix:
    default: ""
    description: "Additional suffix for cache key. Useful, if installing extras (e.g. [test]) in following steps"
runs:
  using: "composite"
  steps:
    - name: Set up environment
      shell: bash
      run: |
        set -eux
        PYTHON_VERSION="${{ inputs.python_version || matrix.python-version }}"
        NODE_VERSION=${{ inputs.node_version || matrix.node-version || '24.x' }}
        DEPENDENCY_TYPE=${INPUTS_DEPENDENCY_TYPE}
        PYTHON_PACKAGE_MANAGER=${INPUTS_PYTHON_PACKAGE_MANAGER}

        if [ "$PYTHON_PACKAGE_MANAGER" != "pip" ] && [ "$PYTHON_PACKAGE_MANAGER" != "uv pip" ]; then
          echo "Unrecognized package manager $PYTHON_PACKAGE_MANAGER"
          exit 1
        fi

        # Handle default python value based on dependency type.
        if [ $DEPENDENCY_TYPE == "pre" ]; then
          DEFAULT_PYTHON="3.15"
        elif [ $DEPENDENCY_TYPE == "minimum" ]; then
          DEFAULT_PYTHON="3.10"
        elif [ $DEPENDENCY_TYPE != "standard" ]; then
          echo "Unrecognized dependency type $DEPENDENCY_TYPE"
          exit 1
        else
          DEFAULT_PYTHON="3.12"
        fi

        echo "DEFAULT_PYTHON is $DEFAULT_PYTHON"
        PYTHON_VERSION="${PYTHON_VERSION:-$DEFAULT_PYTHON}"

        echo "PYTHON_VERSION=$PYTHON_VERSION" >> $GITHUB_ENV
        echo "NODE_VERSION=$NODE_VERSION" >> $GITHUB_ENV
        echo "CACHE_PREFIX=${{ runner.os }}-${GITHUB_WORKFLOW}-${{ github.job }}" >> $GITHUB_ENV
        echo "DEPENDENCY_TYPE=$DEPENDENCY_TYPE" >> $GITHUB_ENV
        echo "PYTHON_PACKAGE_MANAGER=$PYTHON_PACKAGE_MANAGER" >> $GITHUB_ENV
      env:
        INPUTS_DEPENDENCY_TYPE: ${{ inputs.dependency_type }}
        INPUTS_PYTHON_PACKAGE_MANAGER: ${{ inputs.python_package_manager }}

    - name: Install Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        allow-prereleases: true

    - name: Install uv
      if: env.PYTHON_PACKAGE_MANAGER == 'uv pip'
      shell: bash
      run: python -m pip install --upgrade uv

    # Cache the dependencies installed by the selected Python package manager.
    # We cannot use the builtin cache because it errors out with the files
    # are not present.
    - name: Get Python package manager cache dir
      id: python-pm-cache
      shell: bash
      run: |
        if [ "$PYTHON_PACKAGE_MANAGER" == "uv pip" ]; then
          echo "dir=$(uv cache dir)" >> $GITHUB_OUTPUT
          echo "cache-key=uv" >> $GITHUB_OUTPUT
        else
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT
          echo "cache-key=pip" >> $GITHUB_OUTPUT
        fi
    - name: Cache Python package manager
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ${{ steps.python-pm-cache.outputs.dir }}
        key: ${{ env.CACHE_PREFIX }}-${{ steps.python-pm-cache.outputs.cache-key }}-${{ env.PYTHON_VERSION }}-${{ env.DEPENDENCY_TYPE }}${{ inputs.python_cache_key_suffix && format('-{0}', inputs.python_cache_key_suffix) || '' }}-${{ hashFiles('setup.cfg', 'setup.py', '**/requirements.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ env.CACHE_PREFIX }}-${{ steps.python-pm-cache.outputs.cache-key }}-${{ env.PYTHON_VERSION }}-${{ env.DEPENDENCY_TYPE }}${{ inputs.python_cache_key_suffix && format('-{0}', inputs.python_cache_key_suffix) || '' }}
          ${{ env.CACHE_PREFIX }}-${{ steps.python-pm-cache.outputs.cache-key }}-${{ env.PYTHON_VERSION }}-${{ env.DEPENDENCY_TYPE }}
          ${{ env.CACHE_PREFIX }}-${{ steps.python-pm-cache.outputs.cache-key }}-${{ env.PYTHON_VERSION }}

    - name: Detect package manager
      id: detect-pm
      shell: bash
      run: |
        if [ -n "$PNPM_HASH" ]; then
          echo "manager=pnpm" >> $GITHUB_OUTPUT
          echo "lock-hash=$PNPM_HASH" >> $GITHUB_OUTPUT
        elif [ -n "$YARN_HASH" ]; then
          echo "manager=yarn" >> $GITHUB_OUTPUT
          echo "lock-hash=$YARN_HASH" >> $GITHUB_OUTPUT
        elif [ -n "$NPM_HASH" ]; then
          echo "manager=npm" >> $GITHUB_OUTPUT
          echo "lock-hash=$NPM_HASH" >> $GITHUB_OUTPUT
        elif [ -f package.json ]; then
          # Fall back to yarn when no lock file is found but package.json exists
          echo "manager=yarn" >> $GITHUB_OUTPUT
        fi
      env:
        PNPM_HASH: ${{ hashFiles('**/pnpm-lock.yaml') }}
        YARN_HASH: ${{ hashFiles('**/yarn.lock') }}
        NPM_HASH: ${{ hashFiles('**/package-lock.json') }}

    - name: Install pnpm
      if: steps.detect-pm.outputs.manager == 'pnpm'
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      with:
        version: ${{ inputs.pnpm_version }}

    - name: Install node
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Enable corepack
      if: steps.detect-pm.outputs.manager != 'pnpm'
      shell: bash
      run: |
        if [ -f package.json ] && grep -q '"packageManager"' package.json; then
          corepack enable
        fi

    # Cache package manager
    - name: Get package manager cache dir
      id: pm-cache
      if: steps.detect-pm.outputs.manager != ''
      shell: bash
      run: |
        if [ "$MANAGER" == "pnpm" ]; then
          echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
        elif [ "$MANAGER" == "yarn" ]; then
          CACHE_DIR=$(yarn config get cacheFolder 2>/dev/null)
          [[ "$CACHE_DIR" == "undefined" ]] && CACHE_DIR=$(yarn cache dir 2>/dev/null)
          echo "dir=$CACHE_DIR" >> $GITHUB_OUTPUT
        elif [ "$MANAGER" == "npm" ]; then
          echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
        fi
      env:
        MANAGER: ${{ steps.detect-pm.outputs.manager }}

    - name: Cache package manager
      if: steps.detect-pm.outputs.manager != ''
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ${{ steps.pm-cache.outputs.dir }}
        key: ${{ env.CACHE_PREFIX }}-${{ steps.detect-pm.outputs.manager }}-${{ env.NODE_VERSION }}-${{ steps.detect-pm.outputs.lock-hash }}
        restore-keys: |
          ${{ env.CACHE_PREFIX }}-${{ steps.detect-pm.outputs.manager }}-${{ env.NODE_VERSION }}

    - name: Cache checked links
      if: ${{ matrix.group == 'link_check' }}
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.cache/pytest-link-check
        key: ${{ env.CACHE_PREFIX }}-linkcheck-${{ hashFiles('**/*.md', '**/*.rst') }}-links
        restore-keys: |
          ${{ env.CACHE_PREFIX }}-linkcheck-

    - name: Cache conda
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/conda_pkgs_dir
        key: ${{ env.CACHE_PREFIX  }}-conda-${{ env.CACHE_NUMBER }}-${{
          hashFiles('**/environment*.yml') }}
        restore-keys: |
          ${{ env.CACHE_PREFIX }}-conda-

    - name: Enable long paths on Windows
      if: startsWith(runner.os, 'Windows')
      run: Set-ItemProperty -Path HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem -Name LongPathsEnabled -Value 1
      shell: pwsh

    - name: Upgrade packaging dependencies
      shell: bash
      run: |
        set -eux
        echo "::group::Upgrade packaging dependencies"
        if [ "$PYTHON_PACKAGE_MANAGER" == "uv pip" ]; then
          uv pip install --system --upgrade pip pipx
        else
          python -m pip install --upgrade pip pipx
        fi
        # For https://github.com/pypa/hatch/issues/2193 to handle older Python versions
        if python -c 'import sys; raise SystemExit(0 if sys.version_info[:2] <= (3, 9) else 1)'; then
          HATCH_SPEC="hatch"
          LEGACY_VIRTUALENV_SPEC="virtualenv<21"
        else
          HATCH_SPEC="hatch>=1.16.5"
          LEGACY_VIRTUALENV_SPEC=""
        fi
        if [ "$RUNNER_OS" != "Windows" ]; then
          pipx install "$HATCH_SPEC" --python "$(which python)"
        else
          pipx install "$HATCH_SPEC"
        fi
        if [ -n "$LEGACY_VIRTUALENV_SPEC" ]; then
          pipx inject hatch "$LEGACY_VIRTUALENV_SPEC"
        fi
        echo "::endgroup::"

    - name: Handle dependency type
      shell: bash
      run: |
        set -eux
        if [ $DEPENDENCY_TYPE == 'pre' ]; then
          echo "PIP_PRE=1" >> $GITHUB_ENV
          echo "UV_PRERELEASE=allow" >> $GITHUB_ENV
        elif [ $DEPENDENCY_TYPE == 'minimum' ]; then
          source ${{ github.action_path }}/setup_constraints.sh
        fi

    - name: Print Diagnostics
      shell: bash
      run: |
        set -eux
        echo "::group::env"
        env
        echo "::endgroup::"
        pip debug || true
        echo "::group::piplist"
        pip list || true
        echo "::endgroup::"
        uv --version || true
        node --version
        npm --version || true
        yarn --version || true
        pnpm --version || true
